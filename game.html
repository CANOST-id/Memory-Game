<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
</head>

<body class="code-vibes">
    <section class="game">
        <header>
            <section class="standings">
                <div class="standings__player standings__player--blue">
                    <div class="--label"></div>
                    <p>Blue</p>
                    <div class="--score">0</div>
                </div>
                <div class="standings__player standings__player--orange">
                    <div class="--label"></div>
                    <p>Orange</p>
                    <div class="--score">0</div>
                </div>
            </section>

            <section class="current-player">
                <p>Current player: </p>
                <div class="current-player__indicator"></div>
            </section>

            <button id="exit-game">
                <img src="/src/assets/icons/move_item.png" alt="exit icon">
                Exit game
            </button>

        </header>


        <section class="game__table"></section>

        <dialog>
            <h2></h2>
            <div class="dialog__wrapper">
                <button id="back-to-game">Back to game</button>
                <button id="exit-game-dialog">Exit game</button>
            </div>
        </dialog>
    </section>

    <script type="module" src="/src/main.ts"></script>

</body>

</html>
