<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Settings</title>
</head>

<body>
    <section class="settings">
        <section class="title">
            <h1>Settings</h1>
            <svg xmlns="http://www.w3.org/2000/svg" width="263" height="24" viewBox="0 0 263 24" fill="none">
                <path
                    d="M-0.000152588 11.547L11.5469 23.094L23.0939 11.547L11.5469 -8.58307e-06L-0.000152588 11.547ZM262.547 11.547V9.547L11.5469 9.547V11.547V13.547L262.547 13.547V11.547Z"
                    fill="#F0EA6E" />
            </svg>
        </section>

        <section class="settings-content">
            <div class="settings-menu">
                <div class="theme-options">
                    <div class="title__wrapper">
                        <img src="./src/assets/icons/palette.png" alt="palette icon">
                        <h2>Game themes</h2>
                    </div>
                    <div>
                        <input type="radio" name="theme" value="code-vibes" id="code-vibes" checked>
                        <label for="code-vibes">Code vibes theme</label>
                    </div>
                    <div>
                        <input type="radio" name="theme" value="gaming" id="gaming">
                        <label for="gaming">Gaming theme</label>
                    </div>
                </div>

                <div class="choose-player">
                    <div class="title__wrapper">
                        <img src="./src/assets/icons/chess_pawn.png" alt="chess pawn icon">
                        <h2>Choose player</h2>
                    </div>
                    <div>
                        <input type="radio" name="player" value="player1" id="player1">
                        <label for="player1">Player 1</label>
                    </div>
                    <div>
                        <input type="radio" name="player" value="player2" id="player2">
                        <label for="player2">Player 2</label>
                    </div>
                </div>

                <div class="board-size">
                    <div class="title__wrapper">
                        <img src="./src/assets/icons/style.png" alt="style icon">
                        <h2>Board size</h2>
                    </div>
                    <div>
                        <input type="radio" name="board-size" value="16 cards" id="16-cards">
                        <label for="16-cards">16 Cards</label>
                    </div>

                    <div>
                        <input type="radio" name="board-size" value="24 cards" id="24-cards">
                        <label for="24-cards">24 Cards</label>
                    </div>

                    <div>
                        <input type="radio" name="board-size" value="36 Cards" id="36-cards">
                        <label for="36-cards">36 Cards</label>
                    </div>
                </div>
            </div>

            <div class="settings-preview">
                <div class="image-preview">
                    <img src="./src/assets/images/code-vibes-img.png" alt="code vibes theme preview"
                        class="code-vibes-preview">
                </div>

                <div class="preview__box">
                    <p>Game theme</p>
                    <div class="hr__wrapper">
                        <div class="hr__face"></div>
                        <div class="hr__face hr__face--back"></div>
                    </div>
                    <p>Player</p>
                    <div class="hr__wrapper">
                        <hr class="hr__face">
                        <hr class="hr__face hr__face--back">
                    </div>
                    <p>Board size</p>

                    <button class="start">
                        <img src="./src/assets/icons/play_icon.png" alt="play icon">
                        Start
                    </button>
                </div>
            </div>
        </section>
    </section>

    <script type="module" src="/src/main.ts"></script>

</body>

</html>
